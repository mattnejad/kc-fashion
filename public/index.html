<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Kinsey Cathers Fashion</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Splash / loading -->
  <div id="splash" class="auth-screen">
    <svg class="auth-logo" viewBox="0 0 100 100" role="img" aria-label="Kinsey Cathers Fashion logo">
      <circle cx="50" cy="50" r="47" fill="none" stroke="#b8975a" stroke-width="1.6" />
      <circle cx="50" cy="50" r="41" fill="none" stroke="#b8975a" stroke-width="0.6" opacity="0.55" />
      <text x="38" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="46" text-anchor="middle" fill="#b8975a">K</text>
      <text x="63" y="67" font-family="Georgia, 'Times New Roman', serif" font-size="52" text-anchor="middle" fill="#b8975a" opacity="0.92">C</text>
    </svg>
    <div class="auth-title">Kinsey Cathers</div>
    <div class="auth-sub">Fashion</div>
    <div id="splash-status" class="auth-status">Loading&hellip;</div>
  </div>

  <!-- Sign-in screen -->
  <div id="auth-screen" class="auth-screen" style="display:none;">
    <svg class="auth-logo" viewBox="0 0 100 100" role="img" aria-label="Kinsey Cathers Fashion logo">
      <circle cx="50" cy="50" r="47" fill="none" stroke="#b8975a" stroke-width="1.6" />
      <circle cx="50" cy="50" r="41" fill="none" stroke="#b8975a" stroke-width="0.6" opacity="0.55" />
      <text x="38" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="46" text-anchor="middle" fill="#b8975a">K</text>
      <text x="63" y="67" font-family="Georgia, 'Times New Roman', serif" font-size="52" text-anchor="middle" fill="#b8975a" opacity="0.92">C</text>
    </svg>
    <div class="auth-title">Kinsey Cathers</div>
    <div class="auth-sub">Fashion</div>
    <button id="btn-signin" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    <span>Sign in with Google</span>
    </button>
    <p class="auth-hint">Your data is private to your account and syncs across your devices.</p>
    <div id="auth-error" class="auth-error" style="display:none;"></div>
  </div>

  <div id="app" style="display:none;">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="brand-group">
          <svg class="brand-mark" viewBox="0 0 100 100" role="img" aria-label="Kinsey Cathers Fashion logo">
            <circle cx="50" cy="50" r="47" fill="none" stroke="#b8975a" stroke-width="1.6" />
            <circle cx="50" cy="50" r="41" fill="none" stroke="#b8975a" stroke-width="0.6" opacity="0.55" />
            <text x="38" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="46" text-anchor="middle" fill="#b8975a">K</text>
            <text x="63" y="67" font-family="Georgia, 'Times New Roman', serif" font-size="52" text-anchor="middle" fill="#b8975a" opacity="0.92">C</text>
          </svg>
          <div class="brand-text">
            <h1 class="brand">Kinsey Cathers</h1>
            <span class="brand-sub">Fashion</span>
          </div>
        </div>
        <span id="sync-dot" class="sync-dot" title="Synced"></span>
        <button id="btn-menu" class="icon-btn" title="Backup &amp; settings" aria-label="Menu">&#9776;</button>
      </div>
    </header>

    <!-- Views -->
    <main id="view" class="view"></main>

    <!-- Bottom navigation -->
    <nav class="tabbar tabbar-6">
      <button class="tab" data-tab="dashboard">
        <span class="tab-ico">&#9733;</span><span>Overview</span>
      </button>
      <button class="tab" data-tab="clients">
        <span class="tab-ico">&#128101;</span><span>Clients</span>
      </button>
      <button class="tab" data-tab="contacts">
        <span class="tab-ico">&#128100;</span><span>Associates</span>
      </button>
      <button class="tab" data-tab="purchases">
        <span class="tab-ico">&#128717;</span><span>Purchases</span>
      </button>
      <button class="tab" data-tab="payments">
        <span class="tab-ico">&#128181;</span><span>Payments</span>
      </button>
      <button class="tab" data-tab="hours">
        <span class="tab-ico">&#128337;</span><span>Hours</span>
      </button>
    </nav>

    <!-- Floating add button -->
    <button id="fab" class="fab" title="Add">+</button>
  </div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <!-- Firebase (compat builds) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
